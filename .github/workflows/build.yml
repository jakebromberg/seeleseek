name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build App
      run: |
        xcodebuild -scheme seeleseek -destination 'platform=macOS' -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  test:
    name: Test
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Run Unit Tests
      run: |
        xcodebuild -scheme seeleseek -destination 'platform=macOS' test -enableCodeCoverage YES -resultBundlePath TestResults.xcresult CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

    - name: Print Coverage Summary
      if: always()
      run: |
        if [ -d TestResults.xcresult ]; then
          xcrun xccov view --report TestResults.xcresult | grep -E '^\S' | head -10
        fi

    - name: Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
